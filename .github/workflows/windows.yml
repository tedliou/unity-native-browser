name: Windows CI

on:
  push:
    branches: [ master ]
    paths:
      - 'src/windows/**'
      - '.github/workflows/windows.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/windows/**'
      - '.github/workflows/windows.yml'

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src/windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src/windows/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('src/windows/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run unit tests
      run: cargo test --target x86_64-pc-windows-msvc

    - name: Build release DLL
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-dll
        path: src/windows/target/x86_64-pc-windows-msvc/release/NativeBrowserWebView.dll
        if-no-files-found: error
        retention-days: 30
