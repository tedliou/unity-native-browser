name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build release AAR
      run: ./gradlew assembleRelease

    - name: Upload AAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-browser-aar
        path: src/android/app/build/outputs/aar/app-release.aar
        if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run unit tests
      run: ./gradlew test

    - name: Generate JaCoCo coverage report
      run: ./gradlew jacocoTestReport

    - name: Upload JaCoCo XML report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage-report
        path: src/android/app/build/reports/jacoco/
        if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Verify coverage threshold (≥85%)
      run: ./gradlew jacocoTestCoverageVerification
